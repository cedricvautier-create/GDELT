name: Mise à jour GDELT temps réel

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: # Pour le lancer manuellement

permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installer les dépendances
        run: pip install websockets pandas requests

      - name: Exécuter la collecte GDELT
        run: python collect_gdelt.py

      - name: Sauvegarder les données sur le dépôt
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          if [ -f gdelt_alerts.json ]; then git add gdelt_alerts.json; fi
          git commit -m "⚡ Mise à jour automatique GDELT" || exit 0
          git push
