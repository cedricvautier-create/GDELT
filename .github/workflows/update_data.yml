      - name: Installer les dépendances
        run: pip install websockets pandas requests

      - name: Exécuter la collecte AIS
        env:
          AISSTREAM_KEY: ${{ secrets.AISSTREAM_KEY }}
        run: python collect_ais.py || echo "Échec AIS mais on continue"

      - name: Exécuter la collecte GDELT
        run: python collect_gdelt.py

      - name: Sauvegarder les données sur le dépôt
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add vessels.json gdelt_alerts.json
          git commit -m "⚡ Mise à jour automatique (AIS & GDELT)" || exit 0
          git push
